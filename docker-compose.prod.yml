# docker-compose.prod.yml - Production Docker Compose
version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: trading-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - trading-network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: trading-postgres
    environment:
      POSTGRES_DB: trading_agent
      POSTGRES_USER: trading_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - trading-network
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: trading-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - trading-network
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  trading-agent:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: trading-agent
    environment:
      DATABASE_URL: postgresql://trading_user:${POSTGRES_PASSWORD}@postgres:5432/trading_agent
      REDIS_URL: redis://redis:6379/0
      OLLAMA_HOST: http://ollama:11434
      LOG_LEVEL: INFO
      MAX_POSITION_SIZE: ${MAX_POSITION_SIZE:-100000}
      MAX_DAILY_LOSS: ${MAX_DAILY_LOSS:-10000}
      RISK_PER_TRADE: ${RISK_PER_TRADE:-0.02}
    ports:
      - "8000:8000"  # FastMCP
      - "8080:8080"  # Health check
      - "8500:8500"  # Web admin
      - "9090:9090"  # Metrics
    volumes:
      - trading-data:/app/data
      - trading-logs:/app/logs
      - trading-reports:/app/reports
    depends_on:
      - redis
      - postgres
      - ollama
    networks:
      - trading-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: trading-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - trading-agent
    networks:
      - trading-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: trading-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - trading-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: trading-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus
    networks:
      - trading-network
    restart: unless-stopped

volumes:
  redis-data:
  postgres-data:
  ollama-models:
  trading-data:
  trading-logs:
  trading-reports:
  prometheus-data:
  grafana-data:

networks:
  trading-network:
    driver: bridge